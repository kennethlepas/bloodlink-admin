<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodLink Admin - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <!-- Firebase SDK v9 Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Welcome/Login Container -->
    <div id="loginContainer" class="welcome-container hidden">
        <div class="welcome-overlay"></div>
        <div class="welcome-content">
            <div class="login-card">
                <div class="login-header">
                    <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="BloodLink Logo"
                        class="logo-image-large">
                    <h1>BloodLink Admin Portal</h1>
                    <p>Manage blood bank operations and save lives</p>
                </div>

                <div id="loginError" class="error-message hidden"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="admin@bloodlink.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Sign In</span>
                        <span class="btn-arrow">→</span>
                    </button>
                </form>

                <div class="login-footer">
                    <p>Secure admin access • BloodLink © 2024</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="{{ url_for('static', filename='firebase-config.js') }}"></script>
    <!-- Authentication -->
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>

</html>
